<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrasi - Koko Cetak</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f3f000;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 30px 0; /* Memberikan ruang aman di HP saat keyboard muncul */
        }

        .reg-container {
            background-color: #2b2b00; /* Disamakan dengan login-card agar tema aplikasi konsisten dan kontras */
            border-radius: 25px;
            color: white;
            padding: 40px 30px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        .reg-title {
            color: #f3f000;
            font-weight: 900;
            text-align: center;
            letter-spacing: 1px;
            margin-bottom: 30px;
            text-transform: uppercase;
            font-size: 2rem;
        }

        .input-group {
            border-bottom: 2px solid rgba(255, 255, 255, 0.3);
            margin-bottom: 22px;
            align-items: center;
            background: transparent;
        }

        .input-group-text {
            background: transparent;
            border: none;
            font-size: 1.1rem;
            padding-left: 5px;
            padding-right: 10px;
            color: #f3f000; /* Warna ikon kuning menyala agar memudahkan fokus mata */
        }

        .form-control {
            background: transparent;
            border: none;
            color: white !important;
            padding: 10px 5px;
            transition: 0.3s;
        }

        .form-control:focus {
            background: transparent;
            box-shadow: none;
            border-color: transparent;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
        }

        /* Efek garis bawah menyala saat kolom input aktif */
        .input-group:focus-within {
            border-bottom: 2px solid #f3f000;
        }

        .btn-reg {
            background-color: #f3f000;
            border: none;
            color: black;
            font-weight: 900;
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            margin-top: 15px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-reg:hover {
            background-color: #d6d600;
            transform: translateY(-2px);
            color: black;
        }

        .login-link {
            text-align: center;
            margin-top: 25px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .login-link a {
            color: #f3f000;
            text-decoration: none;
            font-weight: bold;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        /* ======================================================== */
        /* RESPONSIVE BREAKPOINT UNTUK SMARTPHONE                   */
        /* ======================================================== */
        @media (max-width: 575.98px) {
            body {
                padding: 20px 15px;
                align-items: flex-start; /* Mengalir alami dari atas jika layar HP terlalu pendek */
            }

            .reg-container {
                padding: 30px 20px;
                border-radius: 20px;
            }

            .reg-title {
                font-size: 1.6rem;
                margin-bottom: 25px;
            }
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="reg-container">
        <h2 class="reg-title">REGISTRASI</h2>
        
        <form id="regForm">
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-person"></i></span>
                <input type="text" id="regUsername" class="form-control" placeholder="Username / Nama Lengkap" required>
            </div>

            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                <input type="email" id="regEmail" class="form-control" placeholder="Email" required>
            </div>

            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-telephone"></i></span>
                <input type="text" id="regTelepon" class="form-control" placeholder="No. Telepon / HP" required>
            </div>

            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" id="regPassword" class="form-control" placeholder="Password" required>
            </div>

            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm Password" required>
            </div>
            
            <button type="button" onclick="simpanRegistrasi()" class="btn btn-reg">REGISTRASI</button>
        </form>

        <div class="login-link">
            Sudah punya akun? <a href="login.html">Login di sini</a>
        </div>
    </div>
</div>

<script>
    function simpanRegistrasi() {
        const username = document.getElementById('regUsername').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const telepon = document.getElementById('regTelepon').value.trim();
        const password = document.getElementById('regPassword').value;
        const confirmPass = document.getElementById('confirmPassword').value;

        if (username === "" || email === "" || telepon === "" || password === "") {
            alert("Harap isi semua kolom!");
            return;
        }

        if (password !== confirmPass) {
            alert("Konfirmasi password tidak cocok!");
            return;
        }

        let daftarPelanggan = JSON.parse(localStorage.getItem('daftar_pelanggan_koko'));

        if (!daftarPelanggan) {
            daftarPelanggan = [];
        }

        daftarPelanggan.push({
            nama: username,
            email: email,
            telepon: telepon,
            password: password 
        });

        localStorage.setItem('daftar_pelanggan_koko', JSON.stringify(daftarPelanggan));

        localStorage.setItem('user_koko', username);
        localStorage.setItem('pass_koko', password);

        alert("Registrasi Berhasil!\nAkun Anda telah terdaftar. Silakan login menggunakan password baru Anda.");
        window.location.href = "login.html";
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
