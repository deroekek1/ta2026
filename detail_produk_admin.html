<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Produk - Koko Cetak</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f4f4f4; margin: 0; overflow-x: hidden; }
        
        /* Sidebar Flex Layout */
        .sidebar {
            width: 250px; height: 100vh; background-color: #f7ff00;
            position: fixed; left: 0; top: 0; padding: 20px 0; z-index: 1000;
            display: flex; flex-direction: column; justify-content: space-between;
            box-shadow: 2px 0 5px rgba(0,0,0,0.05);
        }
        .sidebar-brand { text-align: center; font-weight: 800; font-size: 1.1rem; padding: 0 10px 10px; text-transform: uppercase; line-height: 1.2; border-bottom: 2px solid #000; margin: 0 10px 15px; }
        .nav-link { padding: 12px 25px; color: #000; font-weight: 600; display: flex; align-items: center; text-decoration: none; transition: 0.3s; }
        .nav-link i { font-size: 1.3rem; margin-right: 15px; }
        .nav-link:hover, .nav-link.active { background-color: rgba(0,0,0,0.05); }
        .logo-container { padding: 20px 0; width: 100%; text-align: center; }

        /* Main Content & Top Bar */
        .main-content { margin-left: 250px; width: calc(100% - 250px); min-height: 100vh; }
        .top-bar { background-color: #000; color: #fff; padding: 12px 30px; display: flex; justify-content: space-between; align-items: center; }
        .logo-top-left { display: flex; align-items: center; gap: 15px; }
        .top-bar h5 { color: #f7ff00; font-weight: 800; margin: 0; font-size: 1.2rem; }
        .admin-text { color: #f7ff00; font-size: 0.85rem; }

        /* Content Area */
        .content-body { padding: 30px; }
        
        /* Header Title PRODUK */
        .header-title { 
            background-color: #f7ff00; padding: 12px; text-align: center; 
            font-weight: 800; border-radius: 10px; width: 50%; 
            margin: 0 auto 30px; text-transform: uppercase; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); font-size: 1.4rem; letter-spacing: 1px;
            color: #000;
        }

        /* Panel Box Detail */
        .panel-box { background: #fff; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); overflow: hidden; }
        .panel-header { background-color: #d1d1d1; padding: 12px 20px; font-weight: 700; font-size: 1.1rem; border-bottom: 1px solid #ccc; }
        .panel-body { padding: 25px; }

        /* Custom Table Layout Vertikal */
        .table-detail { width: 100%; border-collapse: collapse; border: 1px solid #ccc; }
        .table-detail th { background-color: #fff; color: #000; font-weight: 700; font-size: 1.1rem; padding: 15px 20px; text-align: left; vertical-align: top; border: 1px solid #ccc; width: 20%; }
        .table-detail td { padding: 15px 20px; border: 1px solid #ccc; font-size: 0.95rem; color: #333; vertical-align: top; }
        
        .product-img-detail { width: 150px; aspect-ratio: 1/1; object-fit: cover; border: 1px solid #ccc; padding: 4px; background: #fff; }
        
        /* Button Kembali */
        .btn-back { background-color: #000; color: #f7ff00; font-weight: 700; border: none; padding: 10px 25px; border-radius: 8px; text-decoration: none; display: inline-block; transition: 0.3s; text-transform: uppercase; font-size: 0.9rem; }
        .btn-back:hover { background-color: #333; color: #fff; }
    </style>
</head>
<body>

<div class="sidebar shadow">
    <div>
        <div class="sidebar-brand">SISTEM<br>PEMESANAN</div>
        <nav class="nav flex-column">
            <a class="nav-link" href="index_admin.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
            <a class="nav-link active" href="produk_admin.html"><i class="bi bi-box-seam"></i> Produk</a>
            <a class="nav-link" href="pembelian_admin.html"><i class="bi bi-cart3"></i> Pembelian</a>
            <a class="nav-link" href="pelanggan.html"><i class="bi bi-people"></i> Pelanggan</a>
            <a class="nav-link" href="laporan.html"><i class="bi bi-journal-text"></i> Laporan</a>
            <a class="nav-link" href="login.html"><i class="bi bi-box-arrow-left"></i> LogOut</a>
        </nav>
    </div>
    <div class="logo-container">
        <img src="img/logo_koko.png" class="rounded-circle" width="200" alt="Logo">
    </div>
</div>

<div class="main-content"> 
    <div class="top-bar shadow-sm">
        <div class="logo-top-left">
            <img src="img/logo_koko.png" class="rounded-circle shadow-sm" width="55">
            <h5>KOKO CETAK UV PRINTING</h5>
        </div>
        <div class="admin-text">
            Selamat Datang <span id="user-aktif">Admin</span> <i class="bi bi-person-circle ms-2"></i>
        </div>
    </div>

    <div class="content-body">
        <div class="header-title">PRODUK</div>

        <div class="panel-box">
            <div class="panel-header">Data Produk</div>
            <div class="panel-body">
                
                <table class="table-detail mb-4">
                    <tbody>
                        <tr>
                            <th>Nama Produk</th>
                            <td id="detail-nama">-</td>
                        </tr>
                        <tr>
                            <th>Harga</th>
                            <td id="detail-harga" class="fw-semibold text-danger">-</td>
                        </tr>
                        <tr>
                            <th>Deskripsi</th>
                            <td id="detail-deskripsi">-</td>
                        </tr>
                        <tr>
                            <th>Foto Produk</th>
                            <td>
                                <img id="detail-foto" src="img/emon.png" class="product-img-detail shadow-sm" alt="Foto Produk">
                            </td>
                        </tr>
                    </tbody>
                </table>

                <a href="produk_admin.html" class="btn-back"><i class="bi bi-arrow-left me-2"></i>Kembali</a>

            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    window.onload = function() {
        // 1. Sinkronisasi Nama Admin Aktif
        const namaUser = sessionStorage.getItem('current_user');
        if (namaUser) {
            document.getElementById('user-aktif').innerText = namaUser;
        }

        // 2. Ambil parameter ID dari URL (?id=X)
        const urlParams = new URLSearchParams(window.location.search);
        const idParam = urlParams.get('id');

        if (idParam !== null) {
            // SINKRONISASI KEY STORAGE: Diubah menjadi 'daftar_produk' agar sama dengan dashboard pelanggan & admin
            const daftarProduk = JSON.parse(localStorage.getItem('daftar_produk')) || [];
            
            // Cari data produk secara spesifik yang properti 'id'-nya cocok dengan parameter URL
            const produk = daftarProduk.find(item => item.id == idParam);

            if (produk) {
                // Formatting harga ke format rupiah agar rapi di panel admin
                const hargaNominal = parseInt(produk.harga) || 0;
                const formatRupiah = "Rp " + hargaNominal.toLocaleString('id-ID');

                // Tampilkan data produk dinamis dari LocalStorage
                document.getElementById('detail-nama').innerText = produk.nama || produk.nama_produk;
                document.getElementById('detail-harga').innerText = formatRupiah;
                
                // Fallback untuk foto/gambar produk
                document.getElementById('detail-foto').src = produk.gambar || produk.foto || "img/emon.png";
                
                // Konversi baris baru deskripsi ke tag HTML break
                if (produk.deskripsi) {
                    document.getElementById('detail-deskripsi').innerHTML = produk.deskripsi.replace(/\n/g, '<br>');
                } else {
                    document.getElementById('detail-deskripsi').innerText = "-";
                }
            } else {
                // Fallback data default E-Money jika ID yang dicari kebetulan adalah data dummy id awal atau data terhapus
                if(idParam == "0" || idParam == "default") {
                    document.getElementById('detail-nama').innerText = "E-toll Emoney Custom Print";
                    document.getElementById('detail-harga').innerText = "Rp 60.000";
                    document.getElementById('detail-foto').src = "img/emon.png";
                    document.getElementById('detail-deskripsi').innerHTML = `
                        Jenis Kartu: E-Money<br>
                        Catatan:<br>
                        - Saldo Rp. 0,-<br>
                        - Gratis Plastik Kartu<br><br>
                        Proses Cetak: UV Printing (BUKAN menggunakan stiker/garskin, jadi gambar lebih tajam, berkualitas, bertekstur & tahan lama)<br><br>
                        Kegunaan E-toll untuk pembayaran:<br>
                        - Toll / Parkir / SPBU<br>
                        - Pembayaran transportasi umum: transjakarta, angkot Jak lingko, kereta, dll.<br>
                        - Belanja di indomaret/alfamart, dsb.
                    `;
                } else {
                    alert("Data produk tidak ditemukan!");
                    window.location.href = "produk_admin.php";
                }
            }
        } else {
            // Jika masuk ke halaman tanpa ID parameter, kembalikan ke list manajemen produk
            window.location.href = "produk_admin.php";
        }
    };
</script>
</body>
</html>
