<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Koko Cetak</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: #f3f000;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 30px 0; /* Memberi ruang napas atas-bawah di HP */
        }

        /* WELCOME TEXT */
        .welcome-text {
            font-size: 3.5rem; /* Menggunakan rem agar lebih responsif */
            font-weight: 900;
            text-align: center;
            margin-bottom: 30px;
            width: 100%;
            color: #000;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        /* CARD STYLE */
        .login-card {
            background: #2b2b00; /* Dibuat sedikit lebih gelap agar kontras teks putih dan komponen kuning menyala jernih */
            border-radius: 20px;
            padding: 40px;
            color: #fff;
            height: 100%;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }

        .illustration-card {
            background: #2b2b00;
            border-radius: 20px;
            padding: 30px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }

        /* LOGIN FORM */
        .form-control {
            background: transparent;
            border: none;
            border-bottom: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 0;
            color: #fff !important;
            padding-left: 10px;
            transition: 0.3s;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .form-control:focus {
            box-shadow: none;
            border-bottom: 2px solid #f3f000;
            background: transparent;
        }

        .input-group-text {
            background: transparent;
            border: none;
            color: #f3f000; /* Mengubah warna icon menjadi kuning agar senada dan eye-catching */
            padding-right: 0;
            font-size: 1.2rem;
        }

        .btn-login {
            background: #f3f000;
            color: #000;
            font-weight: bold;
            border-radius: 8px;
            padding: 12px;
            transition: 0.3s;
            border: none;
        }

        .btn-login:hover {
            background: #d6d600;
            transform: translateY(-2px);
            color: #000;
        }

        .small-text {
            font-size: 14px;
        }
        
        .text-warning-custom {
            color: #f3f000 !important;
            text-decoration: none;
        }
        
        .text-warning-custom:hover {
            text-decoration: underline;
        }

        /* ======================================================== */
        /* RESPONSIVE BREAKPOINT UNTUK HP (ANDROID / IOS)           */
        /* ======================================================== */
        @media (max-width: 767.98px) {
            body {
                padding: 20px 0;
                align-items: flex-start; /* Mencegah kepotong di HP layar pendek */
            }

            .welcome-text {
                font-size: 2.2rem; /* Ukuran teks mengecil proporsional di HP Android */
                margin-bottom: 20px;
            }

            .login-card {
                padding: 30px 20px; /* Memperkecil padding dalam agar form tidak kesempitan */
            }

            .illustration-card {
                padding: 20px;
                background: transparent; /* Menghilangkan background ganda di HP agar fokus ke logo saja */
                box-shadow: none;
            }

            .illustration-card img {
                max-height: 160px; /* Ukuran logo mengecil pas di layar Android */
            }
        }
    </style>
</head>

<body>
    <div class="container my-auto">
        <h1 class="welcome-text">Welcome!</h1>
        <div class="row g-4 justify-content-center align-items-stretch">
            <div class="col-12 col-md-5 col-lg-4">
                <div class="illustration-card">
                    <img src="img/logo_koko.png" 
                        class="rounded-circle shadow" 
                        alt="Logo Koko Cetak"
                        style="max-height:240px; aspect-ratio: 1/1; object-fit: cover;">
                </div>
            </div>
            
            <div class="col-12 col-md-6 col-lg-5">
                <div class="login-card">
                    <div class="text-center mb-4">
                        <h4 class="fw-bold" style="color: #f3f000;">SISTEM PEMESANAN</h4>
                        <h5 class="fw-bold text-white">KOKO CETAK</h5>
                    </div>
                    <form id="loginForm">
                        <div class="input-group mb-4">
                            <span class="input-group-text">
                                <i class="bi bi-person"></i>
                            </span>
                            <input type="text" id="username" class="form-control" 
                            placeholder="Nama Pelanggan / Username" required>
                        </div>
                        <div class="input-group mb-4">
                            <span class="input-group-text">
                                <i class="bi bi-lock"></i>
                            </span>
                            <input type="password" id="password" class="form-control" 
                            placeholder="Password" required>
                        </div>
                        <button type="button" onclick="prosesLogin()" class="btn btn-login fw-bold w-100 mb-3">
                            LOGIN
                        </button>
                        <div class="text-center small-text text-white-50">
                            Belum Ada Akun ? <a href="register.html" class="text-warning-custom fw-bold">Daftar disini</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        function prosesLogin() {
            const userInput = document.getElementById('username').value.trim();
            const passInput = document.getElementById('password').value;

            if (userInput === "" || passInput === "") {
                alert("Silahkan isi username dan password!");
                return;
            }

            if (userInput === "admin" && passInput === "admin123") {
                sessionStorage.setItem('current_user', 'Admin'); 
                window.location.href = "index_admin.html"; 
                return;
            } 

            if (userInput === "pelanggan" && passInput === "pelanggan123") {
                sessionStorage.setItem('current_user', 'Pelanggan');
                window.location.href = "index_pelanggan.html"; 
                return;
            }

            let daftarPelanggan = JSON.parse(localStorage.getItem('daftar_pelanggan_koko')) || [];
            const akunDitemukan = daftarPelanggan.find(pelanggan => pelanggan.nama === userInput);

            if (akunDitemukan) {
                if (passInput === akunDitemukan.password) {
                    sessionStorage.setItem('current_user', akunDitemukan.nama); 
                    alert("Login Berhasil! Selamat datang " + akunDitemukan.nama);
                    window.location.href = "index_pelanggan.html";
                    return;
                } else {
                    alert("Password yang Anda masukkan salah!");
                    return;
                }
            }

            const savedUser = localStorage.getItem('user_koko');
            const savedPass = localStorage.getItem('pass_koko');

            if (userInput === savedUser && savedUser !== null) {
                if (passInput === savedPass) {
                    sessionStorage.setItem('current_user', userInput);
                    alert("Login Berhasil! Selamat datang " + userInput);
                    window.location.href = "index_pelanggan.html";
                    return;
                } else {
                    alert("Password hasil registrasi salah!");
                    return;
                }
            }

            alert("Username tidak terdaftar! Periksa kembali ejaan nama atau registrasi ulang.");
        }

        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                prosesLogin();
            }
        });
    </script>
</body>
</html>
