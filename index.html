<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Koko Cetak UV Printing</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f0f4f7;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow-x: hidden; /* Mencegah geser kanan-kiri yang merusak layout */
        }

        /* Bentuk Kuning di Latar Belakang (Desktop) */
        .bg-yellow-shape {
            position: absolute;
            right: 0;
            top: 0;
            width: 60%;
            height: 100%;
            background-color: #f7ff00;
            clip-path: polygon(30% 0%, 100% 0%, 100% 100%, 0% 100%, 0% 50%);
            z-index: 1;
        }

        /* Dekorasi Hitam di Bawah (Desktop) */
        .black-footer-shape {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 60%;
            height: 25%;
            background-color: #000;
            border-top-left-radius: 50px;
            z-index: 2;
        }

        /* Kontainer Utama */
        .hero-section {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            z-index: 5;
            padding: 80px 0; /* Memberi ruang agar tidak mentok atas-bawah di HP */
        }

        .btn-login-top {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #000;
            color: #fff;
            padding: 8px 25px;
            border-radius: 5px;
            font-weight: bold;
            text-decoration: none;
            z-index: 10;
            transition: 0.3s;
        }
        
        .btn-login-top:hover {
            background-color: #333;
            color: #fff;
        }

        .main-title {
            font-size: 3.5rem;
            font-weight: 900;
            color: #000;
            text-transform: uppercase;
            line-height: 1.1;
            margin-bottom: 20px;
        }

        .sub-title {
            font-size: 1.6rem;
            font-weight: 800;
            color: #000;
            background-color: #f7ff00;
            display: inline-block;
            padding: 8px 15px;
            border: 3px solid #000;
            margin-bottom: 30px;
        }

        .logo-wrapper {
            margin-top: 20px;
        }

        .logo-koko {
            max-width: 220px;
            height: auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        /* Area Ilustrasi Desktop */
        .illustration-box {
            position: relative;
            width: 80%;
            margin-left: auto;
            z-index: 4;
        }

        .illustration-box img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* ======================================================== */
        /* RESPONSIVE RESPONSIVE UNTUK SMARTPHONE (ANDROID / IOS)    */
        /* ======================================================== */
        @media (max-width: 991.98px) {
            body {
                overflow-y: auto; /* Izinkan scroll vertikal di HP */
            }

            .hero-section {
                padding-top: 90px; /* Agar konten tidak tertabrak tombol login */
                padding-bottom: 40px;
                height: auto;
                min-height: 100vh;
            }

            /* Ubah background shape menjadi penuh/fleksibel di HP */
            .bg-yellow-shape {
                width: 100%;
                height: 50vh;
                clip-path: polygon(0 0, 100% 0, 100% 85%, 0% 100%);
                opacity: 0.15; /* Dibuat samar agar teks di HP tetap terbaca jelas */
            }

            .black-footer-shape {
                display: none; /* Sembunyikan bentuk hitam yang mengganggu pandangan di HP */
            }

            .main-title {
                font-size: 2.2rem; /* Mengecilkan judul di HP */
                text-shadow: none;
            }

            .sub-title {
                font-size: 1.2rem; /* Mengecilkan sub-judul di HP */
                border: 2px solid #000;
            }

            .logo-koko {
                max-width: 150px; /* Mengecilkan logo di HP */
            }

            .illustration-box {
                width: 70%;
                margin: 40px auto 0 auto; /* Pindah ke bawah konten text secara rapi */
                text-align: center;
            }
            
            .btn-login-top {
                right: 50%;
                transform: translateX(50%); /* Mengetengahkan tombol login di HP agar rapi */
                width: 85%;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <div class="bg-yellow-shape"></div>
    <div class="black-footer-shape"></div>

    <a href="login.html" class="btn-login-top">LOGIN</a>

    <div class="container hero-section">
        <div class="row w-100 align-items-center id-row">
            <div class="col-lg-6 text-center text-lg-start style-content-box">
                <h1 class="main-title">KOKO CETAK<br>UV PRINTING</h1>
                
                <div>
                    <h2 class="sub-title">SISTEM PEMESANAN<br>KOKO CETAK</h2>
                </div>

                <div class="logo-wrapper">
                    <img src="img/logo_koko.png" alt="Logo" class="rounded-circle logo-koko">
                </div>
            </div>

            <div class="col-lg-6">
                <div class="illustration-box">
                    <img src="img/home.png" alt="Ilustrasi Koko Cetak">
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
