<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Pelanggan - Koko Cetak</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f4f4f4; margin: 0; overflow-x: hidden; }
        
        /* Sidebar Flex Layout */
        .sidebar {
            width: 250px; height: 100vh; background-color: #f7ff00;
            position: fixed; left: 0; top: 0; padding: 20px 0; z-index: 1000;
            display: flex; flex-direction: column; justify-content: space-between;
            box-shadow: 2px 0 5px rgba(0,0,0,0.05);
        }
        .sidebar-brand { text-align: center; font-weight: 800; font-size: 1.1rem; padding: 0 10px 10px; text-transform: uppercase; line-height: 1.2; border-bottom: 2px solid #000; margin: 0 10px 15px; }
        .nav-link { padding: 12px 25px; color: #000; font-weight: 600; display: flex; align-items: center; text-decoration: none; transition: 0.3s; }
        .nav-link i { font-size: 1.3rem; margin-right: 15px; }
        .nav-link:hover, .nav-link.active { background-color: rgba(0,0,0,0.05); }
        .logo-container { padding: 20px 0; width: 100%; text-align: center; }

        /* Main Content & Top Bar */
        .main-content { margin-left: 250px; width: calc(100% - 250px); min-height: 100vh; }
        .top-bar { background-color: #000; color: #fff; padding: 12px 30px; display: flex; justify-content: space-between; align-items: center; }
        .logo-top-left { display: flex; align-items: center; gap: 15px; }
        .top-bar h5 { color: #f7ff00; font-weight: 800; margin: 0; font-size: 1.2rem; }
        .admin-text { color: #f7ff00; font-size: 0.85rem; }

        /* Content Area */
        .content-body { padding: 30px; }
        
        /* Header Title */
        .header-title { 
            background-color: #f7ff00; padding: 12px; text-align: center; 
            font-weight: 800; border-radius: 10px; width: 50%; 
            margin: 0 auto 30px; text-transform: uppercase; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); font-size: 1.4rem; letter-spacing: 1px;
            color: #000;
        }

        /* Form Card Style */
        .form-panel { background: #fff; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); overflow: hidden; }
        .form-panel-header { background-color: #d1d1d1; padding: 12px 20px; font-weight: 700; font-size: 1.1rem; border-bottom: 1px solid #ccc; color: #000; }
        .form-panel-body { padding: 30px; }

        .form-label { font-weight: 600; font-size: 0.9rem; color: #333; margin-bottom: 8px; }
        .form-control { border-radius: 8px; padding: 10px; border: 1px solid #ccc; }
        .form-control:focus { border-color: #5a5a00; box-shadow: 0 0 0 0.2rem rgba(90, 90, 0, 0.15); }

        /* Buttons Style */
        .btn-custom { font-weight: 700; padding: 10px 25px; border-radius: 8px; border: none; transition: 0.3s; text-transform: uppercase; font-size: 0.9rem; text-decoration: none; display: inline-block; text-align: center; }
        .btn-save { background-color: #000; color: #f7ff00; }
        .btn-save:hover { background-color: #333; color: #fff; }
        .btn-cancel { background-color: #6c757d; color: #fff; }
        .btn-cancel:hover { background-color: #5a6268; color: #fff; }
    </style>
</head>
<body>

<div class="sidebar shadow">
    <div>
        <div class="sidebar-brand">SISTEM<br>PEMESANAN</div>
        <nav class="nav flex-column">
            <a class="nav-link" href="index_admin.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
            <a class="nav-link" href="produk_admin.html"><i class="bi bi-box-seam"></i> Produk</a>
            <a class="nav-link" href="pembelian_admin.html"><i class="bi bi-cart3"></i> Pembelian</a>
            <a class="nav-link active" href="pelanggan.html"><i class="bi bi-people"></i> Pelanggan</a>
            <a class="nav-link" href="laporan.html"><i class="bi bi-journal-text"></i> Laporan</a>
            <a class="nav-link" href="login.html"><i class="bi bi-box-arrow-left"></i> LogOut</a>
        </nav>
    </div>
    <div class="logo-container">
        <img src="img/logo_koko.png" class="rounded-circle" width="200" alt="Logo">
    </div>
</div>

<div class="main-content">
    <div class="top-bar shadow-sm">
        <div class="logo-top-left">
            <img src="img/logo_koko.png" class="rounded-circle shadow-sm" width="55">
            <h5>KOKO CETAK UV PRINTING</h5>
        </div>
        <div class="admin-text">
            Selamat Datang <span id="user-aktif">Admin</span> <i class="bi bi-person-circle ms-2"></i>
        </div>
    </div>

    <div class="content-body">
        <div class="header-title">EDIT PELANGGAN</div>

        <div class="form-panel">
            <div class="form-panel-header"><i class="bi bi-pencil-square me-2"></i>Ubah Detail Pelanggan</div>
            <div class="form-panel-body">
                
                <form id="formEditPelanggan">
                    <div class="row g-4">
                        <div class="col-md-12">
                            <label class="form-label" for="edit_nama_pelanggan">Nama Pelanggan / Username Login</label>
                            <input type="text" id="edit_nama_pelanggan" class="form-control" placeholder="Masukkan nama pelanggan..." required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label" for="edit_email_pelanggan">Email</label>
                            <input type="email" id="edit_email_pelanggan" class="form-control" placeholder="Contoh: nama@gmail.com" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label" for="edit_telepon_pelanggan">No. Telepon / HP</label>
                            <input type="text" id="edit_telepon_pelanggan" class="form-control" placeholder="Contoh: 08123456789" required>
                        </div>

                        <div class="col-md-12 d-flex gap-3 mt-4">
                            <button type="button" onclick="prosesUpdatePelanggan()" class="btn-custom btn-save">
                                <i class="bi bi-check-lg me-1"></i> Update Data
                            </button>
                            <a href="pelanggan.html" class="btn-custom btn-cancel">
                                <i class="bi bi-x-lg me-1"></i> Batal
                            </a>
                        </div>
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>

<script>
    let pelangganIndex = null;
    let passwordLamaPelanggan = ""; 

    window.onload = function() {
        const namaUser = sessionStorage.getItem('current_user');
        if (namaUser) {
            document.getElementById('user-aktif').innerText = namaUser;
        }

        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');

        if (id !== null) {
            pelangganIndex = parseInt(id);
            
            const daftarPelanggan = JSON.parse(localStorage.getItem('daftar_pelanggan_koko')) || [];
            const pelanggan = daftarPelanggan[pelangganIndex];

            if (pelanggan) {
                document.getElementById('edit_nama_pelanggan').value = pelanggan.nama;
                document.getElementById('edit_email_pelanggan').value = pelanggan.email;
                document.getElementById('edit_telepon_pelanggan').value = pelanggan.telepon;
                
                // Mengunci password asli bawaan akun agar tidak berubah/hilang saat disimpan
                passwordLamaPelanggan = pelanggan.password ? pelanggan.password : "12345";
            } else {
                alert("Data pelanggan tidak ditemukan!");
                window.location.href = "pelanggan.html";
            }
        }
    };

    function prosesUpdatePelanggan() {
        const namaBaru = document.getElementById('edit_nama_pelanggan').value.trim();
        const email = document.getElementById('edit_email_pelanggan').value;
        const telepon = document.getElementById('edit_telepon_pelanggan').value;

        if (namaBaru === "" || email === "" || telepon === "") {
            alert("Harap lengkapi seluruh kolom form!");
            return;
        }

        let daftarPelanggan = JSON.parse(localStorage.getItem('daftar_pelanggan_koko')) || [];
        const namaLama = daftarPelanggan[pelangganIndex].nama;

        // Menyisipkan kembali passwordLamaPelanggan agar fungsionalitas login password lama tidak rusak
        daftarPelanggan[pelangganIndex] = {
            nama: namaBaru,
            email: email,
            telepon: telepon,
            password: passwordLamaPelanggan 
        };
        localStorage.setItem('daftar_pelanggan_koko', JSON.stringify(daftarPelanggan));

        // --- PERBAIKAN: OVERWRITE UNTUK LOCK MEMORI REGISTER LAMA ---
        const savedUser = localStorage.getItem('user_koko');
        if (savedUser === namaLama) {
            localStorage.setItem('user_koko', namaBaru);
        }

        // --- CORE SINKRONISASI DATA LINKING DUA ARAH ---
        let daftarPembelian = JSON.parse(localStorage.getItem('daftar_pembelian_koko')) || [];
        daftarPembelian.forEach(item => {
            if (item.nama === namaLama) item.nama = namaBaru;
        });
        localStorage.setItem('daftar_pembelian_koko', JSON.stringify(daftarPembelian));

        let riwayatKoko = JSON.parse(localStorage.getItem('riwayat_koko')) || [];
        riwayatKoko.forEach(item => {
            if (item.penerima === namaLama) item.penerima = namaBaru;
        });
        localStorage.setItem('riwayat_koko', JSON.stringify(riwayatKoko));

        alert("Data pelanggan berhasil diperbarui! Nama lama '" + namaLama + "' terkunci mati. Sekarang silakan login dengan Username baru dan Password lama.");
        window.location.href = "pelanggan.html"; 
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
